<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Dash Minigame</title>
  <link rel="stylesheet" href="../minigameStyles.css" />
</head>
<body>
  <div class="minigame-shell">
    <div class="minigame-header">
      <h1>Dog Dash</h1>
      <p>Help your dog leap over balls, sticks, and bones to earn points.</p>
      <p>Use the up and down arrow keys to control your dog.</p>
    </div>

    <div class="minigame-info hud">
      <div class="stat-pill">Score: <strong id="score">0</strong></div>
      <div class="stat-pill">Best: <strong id="bestScore">0</strong></div>
      <div class="stat-pill" id="statusMessage">Press Start or tap the space bar to begin.</div>
    </div>

    <div class="game-canvas-wrap">
      <canvas id="gameCanvas" width="800" height="280"></canvas>
    </div>

    <div class="action-area controls">
      <button id="startBtn">Start Game</button>
      <button id="restartBtn" class="secondary">Restart</button>
      <button type="button" onclick="window.location.href='../minigameInstructions/miniInstructions.html?game=minigame4'" class="secondary">How to Play</button>
      <button id="backBtn" class="secondary">Back</button>
    </div>
  </div>

  <script src="minigame4.js"></script>
</body>
</html>
