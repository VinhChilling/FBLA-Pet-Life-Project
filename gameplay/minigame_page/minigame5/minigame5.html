<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minigame 5: Cat Chase</title>
  <link rel="stylesheet" href="../minigameStyles.css" />
</head>
<body>
  <div class="minigame-shell">
    <div class="minigame-header">
      <h1>Cat Chase Training</h1>
      <p>Help your cat chase the mouse around the room.</p>
      <p>Use the arrow keys or WASD to move your cat.</p>
    </div>

    <div class="minigame-info top-bar">
      <div class="stat-pill">Time: <strong id="timer">--</strong></div>
      <div class="stat-pill">Stamina: <strong id="staminaLabel">100%</strong></div>
      <div class="stat-pill">Difficulty: <strong id="difficultyLabel">Easy</strong></div>
    </div>

    <div class="action-area controls">
      <label>
        Difficulty:
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <button id="startBtn">Start</button>
      <button id="restartBtn">Restart</button>
      <button type="button" onclick="window.location.href='../minigameInstructions/miniInstructions.html?game=minigame5'">How to Play</button>
      <button id="backBtn">Back</button>
    </div>

    <div class="game-canvas-wrap">
      <canvas id="gameCanvas" width="940" height="620"></canvas>
    </div>

    <div class="status-message-section">
      <div class="meter" aria-label="Stamina meter">
        <div class="meter-fill" id="staminaFill"></div>
      </div>
      <div class="status-message" id="statusMessage">Use arrow keys / WASD to move. Hold Shift + direction to dash.</div>
    </div>
  </div>
  <script src="minigame5.js"></script>
</body>
</html>
